<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon"
href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌱</text></svg>">
</head>
<body>

<div class="background-glow"></div>

<div class="focus-card">

    <h1>🌱 FocusFlow</h1>
    <p class="subtitle">Stay focused. Grow your plant.</p>

    <div class="plant-circle" id="plantDisplay">
        🌱
    </div>

    <div class="timer" id="timerDisplay">
        00:00:00
    </div>

    <div class="time-select">

        <select id="hours">
            <option value="0">Hours</option>
            <option value="1">1 Hour</option>
            <option value="2">2 Hours</option>
            <option value="3">3 Hours</option>
            <option value="4">4 Hours</option>
            <option value="5">5 Hours</option>
        </select>

        <select id="minutes">
            <option value="0">Minutes</option>
            <option value="10">10 Min</option>
            <option value="20">20 Min</option>
            <option value="30">30 Min</option>
            <option value="40">40 Min</option>
            <option value="50">50 Min</option>
        </select>

    </div>

    <div class="button-group">
        <button class="btn" onclick="openPlantModal()">🪴 Plant</button>
        <button class="btn primary" onclick="startFocus()">▶ Start</button>
        <button class="btn" onclick="openRecords()">📖 Records</button>
        <button class="btn danger" onclick="quitFocus()">✖ Quit</button>
    </div>

    <p class="quote">
        "Small progress every day adds up to big results."
    </p>

</div>

<!-- Plant Modal -->
<div class="modal" id="plantModal">
    <div class="modal-content">
        <h3>Select a Plant 🌱</h3>
        <input id="sessionLabel"
        class="label-input"
        type="text"
        placeholder="Session Label (e.g. DSA Practice)"
        >

        <div class="plant-option" onclick="choosePlant('🌹 Rose')">🌹 Rose</div>
        <div class="plant-option" onclick="choosePlant('🌷 Tulip')">🌷 Tulip</div>
        <div class="plant-option" onclick="choosePlant('🌻 Sunflower')">🌻 Sunflower</div>
        <div class="plant-option" onclick="choosePlant('🌵 Cactus')">🌵 Cactus</div>
        <div class="plant-option" onclick="choosePlant('🌳 Bonsai')">🌳 Bonsai</div>

        <button class="btn" onclick="closePlantModal()">Close</button>
    </div>
</div>

<!-- Records Modal -->
<div class="modal" id="recordsModal">
    <div class="modal-content">
        <h3>📖 Focus Records</h3>

        <ul id="recordsList"></ul>

        <button class="btn" onclick="closeRecords()">Close</button>
    </div>
</div>

<script src="focus.js"></script>

</body>
</html>
